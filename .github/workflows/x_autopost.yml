name: X Autopost

on:
  schedule:
    # 1日3回 (JST 6:15, 12:00, 21:30)
    # 6:15 JST = 21:15 UTC (前日)
    # 12:00 JST = 3:00 UTC
    # 21:30 JST = 12:30 UTC
    - cron: '15 21 * * *'
    - cron: '0 3 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (Generate but do not post)'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

jobs:
  autopost:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Autopost
        run: npx tsx scripts/x_autopost/main.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'no' }}

      - name: Commit and push changes
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'no')
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/x_posts_history.json
          git commit -m "Update X post history [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push
