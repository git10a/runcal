name: X Autopost

on:
  schedule:
    # JST 8:00-21:00 の毎時に起動し、スクリプト側で1日3回ランダム投稿を判定
    # 8:00 JST = 23:00 UTC (前日)
    # 9:00-21:00 JST = 0:00-12:00 UTC
    - cron: '0 23 * * *'
    - cron: '0 0-12 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (Generate but do not post)'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      force_race_name:
        description: 'Optional race name for testing'
        required: false
        default: ''
        type: string
      force_category:
        description: 'Optional category override'
        required: false
        default: 'race_feature'
        type: choice
        options:
          - 'race_feature'
          - 'race_gourmet'
          - 'site_tips'
          - 'dev_story'

jobs:
  autopost:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Autopost
        run: npx tsx scripts/x_autopost/main.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'no' }}
          FORCE_RACE_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_race_name || '' }}
          FORCE_CATEGORY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_category || '' }}

      - name: Commit and push changes
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'no')
        run: |
          git diff --quiet -- data/x_posts_history.json && echo "No history changes to push" && exit 0
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/x_posts_history.json
          git commit -m "Update X post history [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push
