name: Scrape Race Data

on:
  schedule:
    # Run everyday at 12:00 UTC (9:00 PM JST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so push works nicely
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f scraper/requirements.txt ]; then pip install -r scraper/requirements.txt; fi
          playwright install chromium

      - name: Run Main Scraper
        run: python scraper/main.py

      - name: Run AI Entry Update
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PLAYWRIGHT_HEADLESS: 'true'
        run: python scraper/update_races_info.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/races.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update of races.json (including AI entry status updates)" && git push)
